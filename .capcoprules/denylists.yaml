# CapCop Denylists Configuration  
# Define what actions are explicitly prohibited

protect:
  # File paths that should never be accessed
  denyPaths:
    - "node_modules/**/*"
    - "**/.git/**/*"
    - "**/.env"
    - "**/.env.*"
    - "**/id_rsa*"
    - "**/id_ed25519*"
    - "**/.ssh/**/*"
    - "**/*.key"
    - "**/*.pem"
    - "**/*.p12"
    - "**/*.pfx"
    - "**/secrets.json"
    - "**/credentials.json"
    - "**/config/production.*"
    - "~/**/*"
    - "/etc/**/*"
    - "/usr/**/*" 
    - "/var/**/*"
    - "/root/**/*"
    - "/home/*/.ssh/**/*"
    - "C:\\Windows\\**/*"
    - "C:\\Program Files\\**/*"
    - "C:\\Users\\*\\AppData\\**/*"

  # Commands that should never be executed
  denyCommands:
    - "rm -rf"
    - "rm -r"
    - "del /s"
    - "rmdir /s"
    - "sudo"
    - "su"
    - "chmod 777"
    - "chown"
    - "git push --force"
    - "git push -f" 
    - "git reset --hard"
    - "npm publish"
    - "yarn publish"
    - "docker run --privileged"
    - "docker exec -it"
    - "ssh"
    - "scp"
    - "rsync"
    - "curl -s | sh"
    - "wget | sh"
    - "mkfs"
    - "fdisk"
    - "dd if="
    - "format"
    - "diskpart"
    - "regedit"
    - "powershell -ExecutionPolicy Bypass"
    - "bash -i"
    - "nc -l"
    - "netcat -l"
