<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
  <!-- Robot head -->
  <rect x="4" y="2" width="8" height="6" rx="1" fill="currentColor" opacity="0.9"/>
  
  <!-- Eyes -->
  <circle cx="6" cy="4.5" r="0.8" fill="white"/>
  <circle cx="10" cy="4.5" r="0.8" fill="white"/>
  <circle cx="6" cy="4.5" r="0.4" fill="currentColor"/>
  <circle cx="10" cy="4.5" r="0.4" fill="currentColor"/>
  
  <!-- Mouth -->
  <rect x="7" y="6.2" width="2" height="0.6" rx="0.3" fill="white"/>
  
  <!-- Body -->
  <rect x="5" y="8" width="6" height="4" rx="0.5" fill="currentColor" opacity="0.8"/>
  
  <!-- Arms -->
  <rect x="2" y="9" width="3" height="1.5" rx="0.5" fill="currentColor" opacity="0.7"/>
  <rect x="11" y="9" width="3" height="1.5" rx="0.5" fill="currentColor" opacity="0.7"/>
  
  <!-- Legs -->
  <rect x="6" y="12" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
  <rect x="8.5" y="12" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.7"/>
  
  <!-- Antenna -->
  <line x1="8" y1="2" x2="8" y2="0.5" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
  <circle cx="8" cy="0.5" r="0.5" fill="currentColor" opacity="0.6"/>
</svg>
